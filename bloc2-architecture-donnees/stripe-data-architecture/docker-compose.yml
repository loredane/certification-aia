services:

  # ===================== OLTP =====================
  postgres:
    image: postgres:16
    container_name: stripe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stripe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stripe_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-stripe_oltp}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stripe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [stripe-net]

  # ===================== STREAMING =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: stripe-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [stripe-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: stripe-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [stripe-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: stripe-kafka-ui
    depends_on: [kafka]
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: stripe-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [stripe-net]

  # ===================== CDC =====================
  debezium:
    image: debezium/connect:2.5
    container_name: stripe-debezium
    depends_on: [kafka, postgres]
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
    networks: [stripe-net]

  # ===================== OLAP =====================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: stripe-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks: [stripe-net]

  # ===================== NoSQL =====================
  mongodb:
    image: mongo:7
    container_name: stripe-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-stripe}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-stripe_pwd}
      MONGO_INITDB_DATABASE: stripe_nosql
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d
    networks: [stripe-net]

  # ===================== ORCHESTRATION =====================
  airflow:
    image: apache/airflow:2.8.1
    container_name: stripe-airflow
    depends_on: [postgres]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-stripe}:${POSTGRES_PASSWORD:-stripe_pwd}@postgres:5432/${POSTGRES_DB:-stripe_oltp}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
    command: bash -c "airflow db migrate && airflow users create --username airflow --firstname A --lastname A --role Admin --email a@a.fr --password airflow || true; airflow standalone"
    networks: [stripe-net]

  # ===================== TRANSFORMATION =====================
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.4
    container_name: stripe-dbt
    depends_on: [postgres]
    working_dir: /usr/app/stripe_analytics
    volumes:
      - ./dbt/stripe_analytics:/usr/app/stripe_analytics
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml
    entrypoint: ["tail", "-f", "/dev/null"]
    networks: [stripe-net]

  # ===================== GÉNÉRATEUR =====================
  generator:
    build: ./generator
    container_name: stripe-generator
    depends_on: [postgres]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-stripe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stripe_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-stripe_oltp}
    entrypoint: ["tail", "-f", "/dev/null"]
    networks: [stripe-net]

  # ===================== MONITORING =====================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: stripe-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks: [stripe-net]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: stripe-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    networks: [stripe-net]

volumes:
  postgres_data:
  clickhouse_data:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  stripe-net:
    driver: bridge
