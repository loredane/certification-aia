global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "stripe-data-platform"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:29092"]

  - job_name: "clickhouse"
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse:9363"]

  - job_name: "airflow"
    metrics_path: /admin/metrics/
    static_configs:
      - targets: ["airflow:8080"]
